databases:
  - name: aicare-db
    plan: free
    databaseName: aicare
    user: aicare

services:
  - type: web
    name: aicare-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ENVIRONMENT
        value: "production"
      - key: DATABASE_URL
        fromDatabase:
          name: aicare-db
          property: connectionString

  - type: web
    name: aicare-admin-panel
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: DEMO_MODE
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CONTACT_NAME
        value: "Gianmarco"
      - key: CONTACT_EMAIL
        value: "gianmarco.milocco@gmail.com"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: AUTH_COOKIE_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: aicare-db
          property: connectionString
